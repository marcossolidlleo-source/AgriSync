<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriSync</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: {
                            800: '#166534', // Dark green for logo
                        }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        /* Oculta la scrollbar para diseño más limpio */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col transition-colors duration-300">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="flex-1 flex items-center justify-center p-4">
        <div class="glass-panel p-10 rounded-2xl shadow-xl w-full max-w-md text-center border border-gray-200">
            <div class="mb-10">
                <i class="fa-solid fa-leaf text-6xl text-green-800 mb-6 drop-shadow-sm"></i>
                <h1 class="text-4xl font-extrabold text-green-800 tracking-tight">AgriSync</h1>
                <p class="text-gray-500 mt-2 font-medium">Plataforma Inteligente de Agricultura</p>
            </div>
            
            <form id="loginForm" class="space-y-6">
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="password" id="password" placeholder="Contraseña de Acceso" 
                           class="w-full pl-12 pr-4 py-4 rounded-xl border border-gray-300 focus:ring-4 focus:ring-green-500/20 focus:border-green-600 transition-all outline-none text-lg font-medium shadow-sm" required>
                </div>
                <div id="loginError" class="bg-red-50 text-red-600 text-sm py-2 px-4 rounded-lg hidden border border-red-200">
                    <i class="fa-solid fa-circle-exclamation mr-2"></i>Contraseña incorrecta
                </div>
                <button type="submit" class="w-full bg-green-800 hover:bg-green-700 text-white font-bold py-4 px-4 rounded-xl transition-all shadow-lg shadow-green-900/20 transform hover:-translate-y-0.5 mt-4">
                    Ingresar al Sistema
                </button>
            </form>
        </div>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboardScreen" class="hidden flex-1 flex flex-col">
        <!-- Navbar -->
        <nav class="bg-white shadow-sm border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-leaf text-2xl text-green-800"></i>
                <h2 class="text-2xl font-bold text-green-800 tracking-tight">AgriSync</h2>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-sm font-medium text-gray-500">Sistema en línea</span>
                </div>
                <div class="h-6 w-px bg-gray-300"></div>
                <span id="userRole" class="text-sm font-bold bg-green-50 border border-green-200 text-green-800 px-4 py-1.5 rounded-full shadow-sm">Usuario</span>
                <button id="logoutBtn" class="text-gray-500 hover:text-red-600 transition-colors font-medium flex items-center gap-2">
                    <i class="fa-solid fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 p-6 md:p-10 max-w-7xl mx-auto w-full">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
                <div>
                    <h3 class="text-3xl font-bold text-gray-900 tracking-tight mb-2">Panel de Monitoreo</h3>
                    <p class="text-gray-500 font-medium">Lecturas de sensores en tiempo real</p>
                </div>
                <div id="adminControls" class="hidden flex gap-3">
                    <button id="exportSheetsBtn" class="bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-xl text-sm font-bold transition-all shadow-lg hover:shadow-xl flex items-center transform hover:-translate-y-0.5">
                        <i class="fa-solid fa-file-excel mr-3 text-white"></i> Exportar a Sheets
                    </button>
                    <button class="bg-gray-900 hover:bg-gray-800 text-white px-5 py-3 rounded-xl text-sm font-bold transition-all shadow-lg hover:shadow-xl flex items-center transform hover:-translate-y-0.5">
                        <i class="fa-solid fa-sliders mr-3 text-gray-300"></i> Configuración
                    </button>
                </div>
            </div>

            <!-- Sensor Cards Grid -->
            <!-- Utilizamos flex wrap con basis 45% (o w-full md:w-[48%] lg:w-[45%]) para lograr la simetría pedida -->
            <div class="flex flex-wrap gap-6 justify-between" id="sensorGrid">
                <!-- Las tarjetas son inyectadas por app.js -->
            </div>
        </main>
        
    </div>

    <!-- Script de la Aplicación -->
    <script src="https://cdn.landbot.io/landbot-3/landbot-3.0.0.js"></script>
    <script src="app.js"></script>
</body>
</html>
